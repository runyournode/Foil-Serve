name: Docker Build and Push

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # required for SLSA provenance attestation signing via Sigstore/OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false       # keep runner tool cache (needed for actions)
          android: true
          dotnet: true
          haskell: true
          large-packages: true    # removes ~4 GB of unused apt packages
          docker-images: true     # removes pre-pulled images
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (light)
        id: meta-light
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-light
          tags: |
            # main branch
            type=raw,value=main,enable={{is_default_branch}}
            # dev branch — format() avoids single-quote/YAML parsing conflict in GitHub expressions
            type=raw,value=dev,enable=${{ github.ref == format('refs/heads/{0}', 'dev') }}
            # semver releases
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # latest only on release (tag push)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # exact commit
            type=sha

      - name: Extract metadata (offline)
        id: meta-offline
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-offline
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == format('refs/heads/{0}', 'dev') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha

      - name: Build and push light image (no bundled models)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: light
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-light.outputs.tags }}
          labels: ${{ steps.meta-light.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max

      - name: Build and push offline image (bundled models)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: offline
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-offline.outputs.tags }}
          labels: ${{ steps.meta-offline.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max