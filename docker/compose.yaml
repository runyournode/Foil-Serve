services:
  foil_app:
    image: ghcr.io/runyournode/foil-serve:deleteme
#    build:
#      context: ..
#      dockerfile: Dockerfile
    container_name: foil_app
    ipc: host
#    extra_hosts:
#      - "host.docker.internal:host-gateway"
    environment:
      - HF_HUB_OFFLINE=1
      - APP_PORT=8080 # must match CMD if you override (default: 8080)
    expose:
      - "8081"
    ports:
      - "8081:8080"
    volumes:
      - ./mount_config/foil_serve/server_config.toml:/app/config/server_config.toml:ro
      - ./mount_config/foil_serve/pipeline_config.yaml:/app/config/pipeline_config.yaml:ro
      - ./mount_runtime/foil_serve/tmp/foil-serve_failed:/tmp/foil-serve_failed:ro,Z  # failed conversion
#    restart: unless-stopped
    depends_on:
      foil_vllm-PaddleOCR-VL-1.5:
        condition: service_healthy
#      foil_vllm-ministral-3-3b:
#        condition: service_healthy
    networks:
      - foil-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # Hard Req : PaddleOCR-VL-1.5 served by vllm
  foil_vllm-PaddleOCR-VL-1.5:
    image: docker.io/vllm/vllm-openai:v0.17.1-cu130
    container_name: foil_vllm-PaddleOCR-VL-1.5
    ipc: host
    expose:
      - "8000"
    ports:  # dev only
      - "8088:8000"
    environment:
      - HF_HUB_OFFLINE=1
      - PORT=8000  # must match CMD
    volumes:
      - ./mount_config/vllm/PaddlePaddleOCR-VL-1.5_config.yaml:/config/config.yaml:Z,ro
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:z
    command: ["--port", "8000", "--config", "/config/config.yaml"]
    restart: unless-stopped
    networks:
      - foil-net
    healthcheck:
      test: [
        "CMD", "python3", "-c",
        "import urllib.request, os; port = os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]

  # Soft Req : mistralai/ministral-3-3b
  foil-serve_vllm-ministral-3-3b:
    image: docker.io/vllm/vllm-openai:v0.17.1-cu130
    container_name: foil_vllm-ministral-3-3b
    ipc: host
    expose:
      - "8000"
    ports: # dev only
      - "8089:8000"
    environment:
      - HF_HUB_OFFLINE=0
      - PORT=8000  # must match CMD
    volumes:
      - ./mount_config/vllm/Ministral-3-3B-Instruct-2512-AWQ-4bit.yaml:/config/config.yaml:Z,ro
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:z
    command: [ "--port", "8000", "--config", "/config/config.yaml" ]
#    restart: unless-stopped
    networks:
      - foil-net
    healthcheck:
      test: [
        "CMD", "python3", "-c",
        "import urllib.request, os; port = os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]


networks:
  foil-net:
    driver: bridge
