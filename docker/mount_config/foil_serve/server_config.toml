# -------------------------------------------------------------------
# Logging & artifacts                                               -
# All paths below default to /var/log/foil/. This directory must    -
# exist and be writable by the application user.                    -
# Docker: created by the Dockerfile.                                -
# Baremetal: run `sudo mkdir -p /var/log/foil && sudo chown $(whoami) /var/log/foil` -
# (No clearing mechanism — manage disk space manually.)             -
# -------------------------------------------------------------------
log_level = "DEBUG"         # DEBUG | INFO | WARNING | ERROR
libs_log_level = "WARNING"  # Override for verbose third-party libs (httpx, openai, etc.)
log_file = "/var/log/foil/foil.log"  # Comment to disable logging to file

# Base directory for debug artifacts. Subdirectories are created automatically.
artifact_dir = "/var/log/foil/artifacts"

# Save input files and debug artifacts for any failed processing request.
# A timestamped subdirectory is created under `artifact_dir/failed_artifacts_subdir`.
save_failed_artifacts = true
failed_artifacts_subdir = "failed"

# Save artifacts (input spreadsheet + generated PDF) when a sparse spreadsheet
# triggers fallback to PDF+OCR conversion.
save_table_conversion_artifacts = false
table_conversion_artifacts_subdir = "xls2pdf"

# Save artifacts when spreadsheet cells contain errors (#REF!, #N/A, nan, etc.).
# A timestamped subdirectory is created containing: input file,
# md with short error labels (before masking), and final md (after masking).
# Only triggers when at least one error cell is detected.
save_cell_error_artifacts = false
cell_error_artifacts_subdir = "cell_errors"


# All settings below are required
# 'default' are recommanded settings but not set in python code

# -------------------------------------------------------------------
# Safety & Startup checks                                           -
# -------------------------------------------------------------------

# Auth to use this app, if `requires_auth` is false, keys are ignored
requires_auth = true
app_api_keys = [
    "changeme",
#    "changeme2",
]

# Check if all vlm_models declared below are properly reachable on server start-up.
# If any VLM is not reachable, server will not start
check_vlm_endpoints = true

# Maximum accepted file size in MB, checked BEFORE writing to disk.
# Applies to all file types.
max_file_size_mb = 200

# Per-type size limits (checked after MIME detection).
# Each is independent from max_file_size_mb; both are enforced.
max_pdf_file_size_mb = 100
max_image_file_size_mb = 50
max_office_file_size_mb = 100

# Maximum accepted Excel file size in MB.
# For .xlsx (ZIP format): both the compressed (on-disk) size and the actual decompressed
# size are checked. The decompressed size is measured by reading the real deflate output
# stream — the ZIP central directory 'file_size' field is attacker-controlled and is NOT
# used, as a forged value would allow a zip bomb to bypass the check.
# For .xls (OLE2 binary, not ZIP): only the on-disk size is checked.
max_excel_file_size_mb = 50

# Maximum allowed decompressed size for ZIP-based files (xlsx, docx, pptx, ods, odt, odp).
# Phase 1: checked against the ZIP central directory declared sizes (fast, no decompression).
# If the declared size exceeds this limit, the file is rejected immediately.
# Phase 2: actual decompression is checked against 1.25× the declared size to detect zip bombs
max_unzip_size_mb = 2048

# -------------------------------------------------------------------
# Spreadsheet processing                                            -
# -------------------------------------------------------------------

# Table format for Excel/ODS → Markdown conversion.
# "llm" (default): minimal formatting, reduced tokens (no padding, short separators)
# "human": aligned columns, full separators (standard tabulate "pipe" format)
excel_output_format = "llm"

# How to handle Excel cell errors (#REF!, #N/A, #VALUE!, #NAME?, #DIV/0!, #NULL!, #NUM!, nan).
# true (default): error cells become empty strings before rendering.
# false: error cells show a short label (e.g. #ref, #n/a, #val, #name, #div, #null, #num).
# In both cases, fully empty rows and columns are stripped from the output.
excel_mask_cell_errors = true

# Maximum ratio of output Markdown size to input file size.
# If exceeded, the request is rejected (HTTP 413).
# Example: 5.0 means a 10 MB Excel may produce at most 50 MB of Markdown.
excel_max_output_ratio = 5.0

# Fallback: if a spreadsheet produces very little cell data (e.g. text boxes,
# images, shapes only), convert to PDF and process via Paddle OCR instead
# (which mean possible allucinations... ).
# Set to false to disable the fallback entirely (sparse spreadsheets will return minimal output).
excel_pdf_fallback_enabled = true
# Minimum input file size (MB) to trigger the emptiness check (skip tiny files).
excel_min_input_for_fallback_mb = 0.5
# If Markdown output is smaller than this fraction of input size, trigger fallback.
excel_min_output_ratio = 0.01

# Paper format used when converting spreadsheets to PDF (for the fallback pipeline).
# Supported values: "A3", "A4", "A2", "Letter", "Legal", "Tabloid"
excel_pdf_paper_format = "A3"

# Page orientation for spreadsheet → PDF conversion (fallback pipeline).
# true (default): landscape — better for wide spreadsheets with many columns.
# false: portrait — better for narrow spreadsheets with few columns.
excel_pdf_landscape = true


# -------------------------------------------------------------------
# OCR output control in Images  (OCR performed by paddle)           -
# -------------------------------------------------------------------
# When a VLM image description IS requested:
# true  → keep <ocr> tags in the final Markdown alongside <figcaption>.
# false → only <figcaption> (VLM description) is emitted; OCR is still
#         used internally as context for the VLM prompt.
output_paddle_ocr = false

# When NO VLM image description is requested:
# true  → keep <ocr> tags in the final Markdown.
# false → no <ocr> tags; also skips the OCR-on-images step in the
#         Paddle pipeline (performance optimization).
output_paddle_ocr_no_img_desc = true


# -------------------------------------------------------------------
# Miscellaneous                                                     -
# -------------------------------------------------------------------

# Directory for temporary files created during request processing.
# Each request gets a short-lived subdirectory that is cleaned up automatically.
# Use "/dev/shm" for pure in-memory I/O (ensure sufficient --shm-size in Docker).
temp_dir = "/tmp/foil-runtime"

# Minimum image size to be included in the response (in pixels)
# If image image_description_model_name is requested, `[[vlm_models]].min_size` takes precedence over this value
image_min_size = [64, 64]


# -------------------------------------------------------------------
# Ressource managaement                                             -
# -------------------------------------------------------------------

# paddle pipeline seems to naturally leaks memory outside of python, leading enventually to oom (RAM)
# Actual work-around is to reload the pipeline every N documents, which takes a few seconds.
# This is acceptable as main model (PaddleOCR-VL-1.5) is not concerned (externally served by vllm).
# Increasing this value will reduce overhead reloading the pipeline too often but will have a bigger RAM
# footprint on your server.
max_tasks_between_pipeline_reload =  5

# Max parallel LibreOffice headless processes (docx, pptx, doc, ppt → pdf conversion)
max_concurrent_libreoffice = 3

# Max parallel Excel → markdown conversions
max_concurrent_excel = 5


# -------------------------------------------------------------------
# Definition of available vlm models for image description          -
# -------------------------------------------------------------------

# [[vlm_models]]
# enabled = <true | false>
# max_concurrent_requests = <int>
# min_size = <Optional min image size to process | [64, 64]>
# temperature = <float>
# max_output_tokens = <int>
# max_input_ocr_length = <Optional max chars of OCR text injected into the VLM prompt | 700>
# name = <"image_description_model_name from the client">
# url = <"url to the openai endpoint">
# endpoint_api_key = <Optional api key | None>
# endpoint_name = <exact model name to pass to the openai endpoint">
# prompt = <"prompt key defined in [prompts] or direct string: e.g: "Describe the image ..." ">

[[vlm_models]]
enabled = true
max_concurrent_requests = 20
name = "ministral-3-3b"
temperature = 0.0
max_output_tokens = 5000
url = "http://foil_vllm-ministral-3-3b:8000/v1"
endpoint_name = "mistralai/ministral-3-3b"
endpoint_api_key = 'none'
prompt = "default"


# Prompt definition for image description
[prompts]

default = """
You are a document analysis expert who specializes in creating text descriptions for images.
You will receive an image of a picture or figure.  Your job will be to create a short description of the image.

**Instructions:**
1. Carefully examine the provided image and the provided extracted text.
2. The extracted text may contain OCR errors, hallucinations, or be entirely irrelevant. Cross-reference it with the visual information. Priority Rule: If there is a conflict between the extracted text and what you visually perceive in the image, prioritize your own visual understanding.
3. Output a faithful description of the image.  Make sure there is enough specific detail to accurately reconstruct the image.  If the image is a figure or contains numeric data, include the numeric data in the output.

**Strict Instructions:**
1. **Style Neutrality:** Do not describe colors, font styles (modern, bold), or artistic layouts unless they convey specific data.
2. **Logos & Simple Text:** If the image is a logo or just stylized text, output ONLY the name of the entity or the exact text found. Do not describe the shapes or colors.
3. **Data Integrity:** If the image is a chart or table, extract the numeric data and titles.
4. **No Fluff:** Avoid introductory phrases like "The image depicts" or "In this graphic". Start directly with the description.


**Example 1 (Logo with Erroneous OCR):**
Input:
```text
D4SSAULT
AVIATION
```
Output:
Logo of DASSAULT AVIATION.

**Example 2 (Chart):**
Input:
```text
"Fruit Preference Survey"
20, 15, 10
Apples, Bananas, Oranges
```
Output:
A bar chart titled "Fruit Preference Survey" is showing the number of people who prefer different types of fruits.  The x-axis shows the types of fruits, and the y-axis shows the number of people.  The bar chart shows that most people prefer apples, followed by bananas and oranges.  20 people prefer apples, 15 people prefer bananas, and 10 people prefer oranges.
**Input:**
```text
{raw_text}
```
"""

another_prompt = "You can define as many prompt as you like. (do not use this one for image descripton :-))"
